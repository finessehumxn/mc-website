name: Daily Culture News Refresh

on:
  schedule:
    - cron: "0 13 * * *"   # every day 13:00 UTC (~6am Phoenix)
  workflow_dispatch:        # lets you run it manually from the Actions tab anytime

permissions:
  contents: write           # allow the action to commit the refreshed news

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build latest culture feed
        run: node build-culture.cjs

      - name: Commit & push if changed
        run: |
          git config user.name  "MC News Bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain index.html culture.html)" ]; then
            git add index.html culture.html
            git commit -m "Daily culture news refresh [skip ci]"
            git push
            echo "Pushed refreshed news."
          else
            echo "No changes today."
          fi
